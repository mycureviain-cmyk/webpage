<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" role="img" aria-label="MyCureVia — Your Path to Better Healthcare">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e5fa8"/>
      <stop offset="1" stop-color="#0c3d66"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17a99a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Wordmark -->
  <text x="8" y="92" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="80" fill="url(#navy)">My</text>

  <!-- Heartbeat pulse -->
  <path d="M150 70 h14 l8 -22 l12 44 l9 -30 l7 14 h16"
        fill="none" stroke="url(#teal)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <text x="232" y="92" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="80" fill="url(#teal)">Cure</text>
  <text x="392" y="92" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="80" fill="url(#navy)">Via</text>

  <!-- Tagline -->
  <g>
    <line x1="60" y1="124" x2="120" y2="124" stroke="#c9a227" stroke-width="2"/>
    <circle cx="124" cy="124" r="3" fill="#c9a227"/>
    <text x="140" y="130" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="16" letter-spacing="3" fill="#0c3d66">YOUR PATH TO BETTER HEALTHCARE</text>
    <circle cx="452" cy="124" r="3" fill="#c9a227"/>
    <line x1="456" y1="124" x2="500" y2="124" stroke="#c9a227" stroke-width="2"/>
  </g>
</svg>
